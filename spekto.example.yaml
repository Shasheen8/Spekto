targets:
  - name: vampi-vulnerable
    protocol: rest
    base_url: http://127.0.0.1:5002
    auth_contexts:
      - vampi-user

auth_contexts:
  - name: vampi-user
    # VAmPI ships with demo users after /createdb is called.
    login:
      method: POST
      url: http://127.0.0.1:5002/users/v1/login
      content_type: application/json
      body: '{"username":"name1","password":"pass1"}'
      capture:
        bearer_json_pointer: /auth_token

  # Add a second context to enable stateful BOLA/BFLA checks.
  # - name: user-bearer
  #   bearer_token_env: USER_BEARER_TOKEN
  #   roles:
  #     - user

scan:
  safety_level: read_only
  allow_write: false
  allow_unsafe_rules: false
  allow_live_ssrf: false
  body_capture: redacted
  follow_redirects: false
  concurrency: 4
  request_budget: 200
  timeout: 10s
  retries: 1
  rate_limit: 5
  max_response_bytes: 65536
  # Restrict scanning to approved hostnames. Supports wildcards (*.example.com).
  target_allowlist:
    - 127.0.0.1
    - localhost

# Operator-provided values for seed generation.
# Matched by parameter name (path_params, query_params) or
# across all locations (constants, including GraphQL argument names).
resource_hints:
  path_params:
    username: "name1"
    book_title: "book1"
