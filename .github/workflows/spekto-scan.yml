name: Spekto API Security Scan

on:
  schedule:
    # Non-blocking weekly scan — review findings without gating merges.
    - cron: '0 2 * * 1'
  workflow_dispatch:
    inputs:
      target:
        description: 'Target name (empty = all targets)'
        required: false
        default: ''
      operation:
        description: 'Operation ID or locator substring (empty = all)'
        required: false
        default: ''
      no_rules:
        description: 'Skip rule-based scanning (seeding only)'
        type: boolean
        required: false
        default: false

jobs:
  scan:
    name: Security scan
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Go
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Build Spekto
        run: go build -o spekto ./cmd/spekto

      - name: Discover inventory
        # Generates inventory.json from a committed OpenAPI spec.
        # Skip this step if you commit inventory.json directly to the repo.
        if: ${{ vars.SPEKTO_OPENAPI_PATH != '' }}
        run: ./spekto discover spec --openapi "$OPENAPI_PATH" --out inventory.json
        env:
          OPENAPI_PATH: ${{ vars.SPEKTO_OPENAPI_PATH }}

      - name: Dry run (validate config and inventory)
        run: ./spekto scan --config spekto.yaml --inventory inventory.json --dry-run

      - name: Run scan
        # Dispatch inputs are read through env vars to prevent shell injection.
        env:
          PROD_BEARER_TOKEN: ${{ secrets.PROD_BEARER_TOKEN }}
          SCAN_TARGET: ${{ inputs.target }}
          SCAN_OPERATION: ${{ inputs.operation }}
          SCAN_NO_RULES: ${{ inputs.no_rules }}
        run: |
          set -euo pipefail
          ARGS=(scan --config spekto.yaml --inventory inventory.json)
          ARGS+=(--seed-store seeds.json --findings-out findings.json --out evidence.json)
          [ -n "$SCAN_TARGET" ]    && ARGS+=(--target    "$SCAN_TARGET")
          [ -n "$SCAN_OPERATION" ] && ARGS+=(--operation "$SCAN_OPERATION")
          [ "$SCAN_NO_RULES" = "true" ] && ARGS+=(--no-rules)
          ./spekto "${ARGS[@]}"

      - name: Upload scan artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: always()
        with:
          name: spekto-${{ github.run_id }}
          path: |
            findings.json
            evidence.json
            inventory.json
            seeds.json
          retention-days: 30
          if-no-files-found: ignore
