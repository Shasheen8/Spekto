name: Auto Tag

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: auto-tag-main
  cancel-in-progress: false

jobs:
  tag:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check triggering workflow result
        env:
          EVENT_NAME: ${{ github.event_name }}
          WORKFLOW_CONCLUSION: ${{ github.event.workflow_run.conclusion }}
        run: |
          set -euo pipefail
          if [ "${EVENT_NAME}" = "workflow_run" ] && [ "${WORKFLOW_CONCLUSION}" != "success" ]; then
            echo "CI did not pass; skipping tag."
            exit 0
          fi

      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          ref: main
          token: ${{ secrets.GH_TOKEN }}

      - name: Fetch tags
        run: git fetch --tags --force

      - name: Compute next minor tag
        id: version
        run: |
          set -euo pipefail

          if git tag --points-at HEAD | grep -Eq '^v[0-9]+\.[0-9]+$' &&
             git tag --points-at HEAD | grep -Eq '^v[0-9]+\.[0-9]+\.0$'; then
            echo "create=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          release_at_head="$(git tag --points-at HEAD | grep -E '^v[0-9]+\.[0-9]+$' | sort -V | tail -n1 || true)"
          if [ -n "${release_at_head}" ]; then
            release="${release_at_head}"
          else
            latest="$(git tag -l 'v[0-9]*.[0-9]*' | grep -E '^v[0-9]+\.[0-9]+$' | sort -V | tail -n1 || true)"
            if [ -z "${latest}" ]; then
              release="v1.1"
            else
              version="${latest#v}"
              IFS='.' read -r major minor <<< "${version}"
              release="v${major}.$((minor + 1))"
            fi
          fi
          module="${release}.0"

          echo "create=true" >> "${GITHUB_OUTPUT}"
          echo "release_version=${release}" >> "${GITHUB_OUTPUT}"
          echo "module_version=${module}" >> "${GITHUB_OUTPUT}"

      - name: Create annotated tag
        if: steps.version.outputs.create == 'true'
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.release_version }}
          MODULE_VERSION: ${{ steps.version.outputs.module_version }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if ! git rev-parse -q --verify "refs/tags/${RELEASE_VERSION}" >/dev/null; then
            git tag -a "${RELEASE_VERSION}" -m "Release ${RELEASE_VERSION}"
          fi
          if ! git rev-parse -q --verify "refs/tags/${MODULE_VERSION}" >/dev/null; then
            git tag -a "${MODULE_VERSION}" -m "Go module ${MODULE_VERSION}"
          fi
          git push origin "${RELEASE_VERSION}" "${MODULE_VERSION}"
