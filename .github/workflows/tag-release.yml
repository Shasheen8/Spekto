name: Auto Tag

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: auto-tag-main
  cancel-in-progress: false

jobs:
  tag:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check triggering workflow result
        env:
          EVENT_NAME: ${{ github.event_name }}
          WORKFLOW_CONCLUSION: ${{ github.event.workflow_run.conclusion }}
        run: |
          set -euo pipefail
          if [ "${EVENT_NAME}" = "workflow_run" ] && [ "${WORKFLOW_CONCLUSION}" != "success" ]; then
            echo "CI did not pass; skipping tag."
            exit 0
          fi

      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          ref: main
          token: ${{ secrets.GH_TOKEN }}

      - name: Fetch tags
        run: git fetch --tags --force

      - name: Compute next minor tag
        id: version
        run: |
          set -euo pipefail

          if git tag --points-at HEAD | grep -Eq '^v[0-9]+\.[0-9]+$'; then
            echo "create=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          latest="$(git tag -l 'v[0-9]*.[0-9]*' --sort=-v:refname | head -n1)"
          if [ -z "${latest}" ]; then
            next="v1.1"
          else
            version="${latest#v}"
            IFS='.' read -r major minor <<< "${version}"
            next="v${major}.$((minor + 1))"
          fi

          echo "create=true" >> "${GITHUB_OUTPUT}"
          echo "version=${next}" >> "${GITHUB_OUTPUT}"

      - name: Create annotated tag
        if: steps.version.outputs.create == 'true'
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${VERSION}" -m "Release ${VERSION}"
          git push origin "${VERSION}"
