name: Release

on:
  push:
    tags:
      - 'v*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Existing tag to publish, for example v1.1'
        required: true

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Resolve version
        id: version
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          if [ "${EVENT_NAME}" = "workflow_dispatch" ]; then
            version="${INPUT_VERSION}"
          else
            version="${REF_NAME}"
          fi
          git fetch --tags --force
          if ! git rev-parse -q --verify "refs/tags/${version}" >/dev/null; then
            echo "tag ${version} does not exist"
            exit 1
          fi
          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          if printf '%s\n' "${version}" | grep -Eq '^v[0-9]+\.[0-9]+\.0$'; then
            echo "skip=true" >> "${GITHUB_OUTPUT}"
            echo "Skipping Go module mirror tag ${version}; GitHub releases use vMAJOR.MINOR tags."
            exit 0
          fi
          if ! printf '%s\n' "${version}" | grep -Eq '^v[0-9]+\.[0-9]+$'; then
            echo "version must look like v1.1"
            exit 1
          fi
          echo "skip=false" >> "${GITHUB_OUTPUT}"

      - name: Seed Go proxy
        if: steps.version.outputs.skip == 'true'
        env:
          VERSION: ${{ steps.version.outputs.version }}
          MODULE: github.com/Shasheen8/Spekto
        run: |
          set -euo pipefail
          gobin="$(mktemp -d)"
          for attempt in 1 2 3 4 5; do
            if GOPROXY=https://proxy.golang.org,direct GONOSUMDB= GOPRIVATE= GONOPROXY= \
                go list -m "${MODULE}@${VERSION}" &&
               GOBIN="${gobin}" GOPROXY=https://proxy.golang.org,direct GONOSUMDB= GOPRIVATE= GONOPROXY= \
                go install "${MODULE}/cmd/spekto@${VERSION}"; then
              "${gobin}/spekto" version
              exit 0
            fi
            sleep "$((attempt * 15))"
          done
          exit 1

      - name: Build release archives
        if: steps.version.outputs.skip != 'true'
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          mkdir -p dist

          for target in \
            "linux amd64" \
            "linux arm64" \
            "darwin amd64" \
            "darwin arm64"
          do
            read -r goos goarch <<< "${target}"
            package="spekto_${VERSION}_${goos}_${goarch}"
            stage="dist/${package}"

            mkdir -p "${stage}"
            CGO_ENABLED=0 GOOS="${goos}" GOARCH="${goarch}" \
              go build -trimpath -ldflags="-s -w -X main.version=${VERSION}" -o "${stage}/spekto" ./cmd/spekto
            cp README.md LICENSE "${stage}/"
            tar -C dist -czf "dist/${package}.tar.gz" "${package}"
            rm -rf "${stage}"
          done

      - name: Generate checksums
        if: steps.version.outputs.skip != 'true'
        run: |
          set -euo pipefail
          (cd dist && sha256sum ./*.tar.gz > checksums.txt)

      - name: Upload release artifacts
        if: steps.version.outputs.skip != 'true'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: release-${{ steps.version.outputs.version }}
          path: dist
          if-no-files-found: error
          retention-days: 30

      - name: Publish GitHub release
        if: steps.version.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          if gh release view "${VERSION}" >/dev/null 2>&1; then
            gh release upload "${VERSION}" dist/* --clobber
          else
            gh release create "${VERSION}" dist/* --verify-tag --generate-notes
          fi
